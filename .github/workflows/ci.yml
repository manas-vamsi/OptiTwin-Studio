name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - name: Solver tests (real backends)
        run: python backend/tests/test_solver.py

  backend-fallback:
    # pure-Python path must stay green on a Python without solver wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install fastapi pydantic
      - name: Solver tests (pure-Python fallback)
        run: python backend/tests/test_solver.py

  rust-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/kernel
      - run: pip install -r backend/requirements.txt maturin
      - name: Build kernel + verify bit-identical results vs Python
        run: |
          cd backend/kernel
          maturin build --release
          pip install target/wheels/*.whl
          cd .. && python tests/bench_kernel.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
